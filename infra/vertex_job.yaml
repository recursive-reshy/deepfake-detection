displayName: deepfake-detection-{job_id}

jobSpec:
  workerPoolSpecs:
    - machineSpec:
        machineType: g2-standard-4
        acceleratorType: NVIDIA_L4
        acceleratorCount: 1
      replicaCount: 1
      containerSpec:
        imageUri: {image_uri}
        command:
          - uv
          - run
          - python
        args:
          - src/training/train.py
          - --job-id
          - "{job_id}"
        env:
          - name: GCP_PROJECT_ID
            value: deepfake-detection-ct0391